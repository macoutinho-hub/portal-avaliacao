<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPA · Portal dos CT · Entrar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0E4D7D 0%, #44B2E4 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 420px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .login-header { background: #0E4D7D; border-radius: 16px 16px 0 0; padding: 1.8rem 2rem; text-align: center; color: white; border-bottom: 3px solid #44B2E4; }
    .login-header img { height: 60px; width: auto; }
    .login-header h1 { font-size: 1.5rem; font-weight: 900; margin-top: .5rem; margin-bottom: .1rem; }
    .login-header .sub { color: #7BCAD7; font-size: .75rem; letter-spacing: 1.5px; text-transform: uppercase; margin: 0; }
  </style>
</head>
<body>
<div class="login-card bg-white">
  <div class="login-header">
    <img src="/static/logo.svg" alt="CPA">
    <h1>CPA</h1>
    <p class="sub">Portal dos CT</p>
  </div>
  <div class="p-4">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="professor@escola.pt" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn w-100 text-white fw-semibold py-2" style="background:#0E4D7D">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
