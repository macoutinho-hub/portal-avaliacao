{% extends "base.html" %}
{% block title %}Alterar Password{% endblock %}
{% block content %}
<div class="px-3" style="max-width:450px">
  <h2 class="fw-bold mb-4"><i class="bi bi-key me-2 text-primary"></i>Alterar Password</h2>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Password actual</label>
          <input type="password" name="password_atual" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Nova password</label>
          <input type="password" name="nova_password" class="form-control" required minlength="6">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirmar nova password</label>
          <input type="password" name="confirmar_password" class="form-control" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-save me-1"></i>Guardar nova password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
