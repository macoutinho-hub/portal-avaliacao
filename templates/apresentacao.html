<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reunião — {{ turma }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --azul:   #0E4D7D;
      --azul2:  #44B2E4;
      --azul3:  #7BCAD7;
      --fundo:  #0a1a2e;
      --card:   #0f2640;
      --borda:  #1a3d5e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--fundo);
      color: white; font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Layout principal ── */
    .ap-wrap { display: flex; flex-direction: column; height: 100vh; }

    /* ── Barra de topo ── */
    .ap-top {
      background: var(--azul); padding: .6rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; border-bottom: 2px solid var(--azul2);
    }
    .ap-turma { font-size: 1.4rem; font-weight: 800; letter-spacing: .5px; }
    .ap-close { color: white; opacity: .6; text-decoration: none; font-size: 1.6rem; }
    .ap-close:hover { opacity: 1; color: white; }

    /* ── Corpo ── */
    .ap-body { flex: 1; display: flex; overflow: hidden; }

    /* ── Coluna esquerda: dados do aluno ── */
    .ap-left {
      width: 340px; flex-shrink: 0;
      background: var(--card); border-right: 1px solid var(--borda);
      display: flex; flex-direction: column; padding: 1.5rem 1.2rem;
      overflow-y: auto;
    }
    .ap-foto-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.2rem; }
    .ap-foto {
      width: 130px; height: 130px; border-radius: 50%;
      object-fit: cover; border: 4px solid var(--azul2);
    }
    .ap-foto-ph {
      width: 130px; height: 130px; border-radius: 50%;
      background: var(--azul2); display: flex; align-items: center;
      justify-content: center; font-size: 4rem; color: rgba(255,255,255,.5);
    }
    .ap-nome { font-size: 1.5rem; font-weight: 800; text-align: center; margin-top: .7rem; line-height: 1.2; }
    .ap-meta { font-size: .95rem; opacity: .5; text-align: center; margin-top: .3rem; margin-bottom: 1rem; }

    /* Médias destacadas */
    .ap-medias { display: flex; gap: .8rem; justify-content: center; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .ap-media-box { text-align: center; }
    .ap-media-val {
      font-size: 2.2rem; font-weight: 900; border-radius: 10px;
      padding: .1rem .7rem; display: inline-block;
    }
    .ap-media-lbl { font-size: .7rem; opacity: .6; margin-top: .1rem; }

    /* Alerta negativas */
    .ap-alerta {
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.5);
      border-radius: 8px; padding: .7rem; margin-bottom: 1rem; font-size: .95rem;
    }
    .ap-alerta-item { display: flex; align-items: center; gap: .5rem; margin-top: .3rem; }

    /* Notas para reunião */
    .ap-nota-bloco { margin-bottom: .9rem; }
    .ap-nota-titulo { font-size: .75rem; font-weight: 700; text-transform: uppercase;
                      letter-spacing: .5px; margin-bottom: .2rem; }
    .ap-nota-texto  { font-size: .9rem; line-height: 1.45; opacity: .85; white-space: pre-wrap; }
    .ap-nota-vazio  { font-size: .85rem; opacity: .28; font-style: italic; }

    /* ── Coluna direita: tabela ── */
    .ap-right { flex: 1; overflow: auto; padding: 1rem 1.5rem; }

    /* Tabela de notas */
    .ap-table { width: 100%; border-collapse: collapse; font-size: 1rem; }
    .ap-table th {
      background: var(--azul); color: white; padding: 8px 6px;
      text-align: center; font-size: .82rem; white-space: nowrap;
      position: sticky; top: 0; z-index: 2; font-weight: 700;
    }
    .ap-table th.label-col { text-align: left; padding-left: 14px; min-width: 130px; font-size: .9rem; }
    .ap-table td {
      padding: 7px 5px; text-align: center;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .ap-table td.label-col {
      text-align: left; padding-left: 14px; font-weight: 700;
      color: rgba(255,255,255,.8); white-space: nowrap; font-size: .95rem;
    }
    .ap-table tr:hover td { background: rgba(255,255,255,.04); }
    .ap-table tr.atual-row td { background: rgba(245,158,11,.1); }
    .ap-table tr.atual-row td.label-col { border-left: 3px solid #f59e0b; color: #fcd34d; }
    .ap-table tr.auto-av-row td { background: rgba(147,51,234,.15); font-weight:700; border-top:2px dashed #9333ea; border-bottom:2px dashed #9333ea; }
    .ap-table tr.auto-av-row td.label-col { color:#c084fc; font-style:italic; }
    .ap-table tr.cif-row td  { background: var(--azul); font-weight: 900; font-size: 1rem; border-top: 2px solid var(--azul2); }
    .ap-table tr.cif-row td.label-col { color: #93c5fd; letter-spacing: .5px; }
    .ap-table tr.cfd-row td  { background: #0f2a4a; font-weight: 900; }
    .ap-table tr.exame-row td { opacity: .45; font-style: italic; }
    .ap-table .sep-col { border-left: 2px solid #22c55e !important; }
    .ap-table .media-col { border-left: 1px solid rgba(255,255,255,.15) !important; font-weight: 800; }

    /* Aba slides */
    .slides-tab {
      position:fixed; right:0; top:50%; transform:translateY(-50%);
      z-index:100;
    }
    .slides-tab-btn {
      writing-mode:vertical-rl; text-orientation:mixed;
      background:var(--azul2); color:white; border:none;
      padding:.8rem .5rem; border-radius:8px 0 0 8px; cursor:pointer;
      font-weight:700; font-size:.85rem; letter-spacing:.5px;
    }
    .slides-panel {
      position:fixed; right:0; top:0; bottom:0; width:520px;
      background:var(--card); border-left:2px solid var(--borda);
      z-index:200; display:flex; flex-direction:column;
      transform:translateX(100%); transition:transform .25s ease;
    }
    .slides-panel.open { transform:translateX(0); }
    .slides-panel-header {
      background:var(--azul); padding:.8rem 1rem;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; border-bottom:2px solid var(--azul2);
    }
    .slides-panel-body { flex:1; overflow-y:auto; padding:1rem; }
    .slide-card {
      background:#1e3a5f; border-radius:8px; margin-bottom:.8rem;
      padding:1rem; cursor:pointer; border:2px solid transparent;
      transition:border-color .15s;
    }
    .slide-card:hover, .slide-card.active { border-color:var(--azul2); }
    .slide-card-titulo { font-weight:700; font-size:.95rem; margin-bottom:.3rem; color:var(--azul3); }
    .slide-card-preview { font-size:.82rem; opacity:.6; }

    /* Slide fullscreen */
    .slide-full {
      position:fixed; inset:0; background:var(--fundo);
      z-index:300; display:flex; flex-direction:column;
    }
    .slide-full-header {
      background:var(--azul); padding:.6rem 1.5rem;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:2px solid var(--azul2); flex-shrink:0;
    }
    .slide-full-body {
      flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:3rem; overflow-y:auto;
    }
    .slide-titulo-grande { font-size:2.5rem; font-weight:900; color:white; margin-bottom:1.5rem; text-align:center; }
    .slide-texto { font-size:1.4rem; color:rgba(255,255,255,.85); line-height:1.7; max-width:800px; text-align:center; white-space:pre-wrap; }
    .slide-lista { list-style:none; padding:0; max-width:700px; width:100%; }
    .slide-lista li {
      display:flex; align-items:flex-start; gap:.8rem;
      font-size:1.4rem; color:rgba(255,255,255,.85); margin-bottom:.9rem;
    }
    .slide-lista li::before { content:'▸'; color:var(--azul2); flex-shrink:0; margin-top:.1rem; }
    .slide-img { max-height:55vh; max-width:100%; border-radius:8px; object-fit:contain; margin-bottom:1.5rem; }
    .slide-nav-bar {
      background:#0a1628; border-top:1px solid var(--borda);
      padding:.7rem 2rem; display:flex; align-items:center;
      justify-content:center; gap:1.5rem; flex-shrink:0;
    }

    /* Vista turma — sem scroll horizontal */
    .vt-wrap { flex:1; overflow-y:auto; overflow-x:hidden; padding:.8rem 1rem; }
    .vt-table {
      width:100%; border-collapse:collapse; table-layout:fixed;
      font-size:clamp(.65rem, 1.1vw, .85rem);
    }
    .vt-table th {
      background:var(--azul); color:white; padding:5px 3px;
      text-align:center; font-size:clamp(.6rem, .9vw, .75rem);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      position:sticky; top:0; z-index:2; font-weight:700;
    }
    .vt-table th.nome-col { text-align:left; padding-left:8px; width:16%; }
    .vt-table td {
      padding:4px 2px; text-align:center;
      border-bottom:1px solid rgba(255,255,255,.06);
      overflow:hidden;
    }
    .vt-table td.nome-col {
      text-align:left; padding-left:8px; font-weight:700;
      color:rgba(255,255,255,.85); white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis; font-size:clamp(.65rem,.9vw,.82rem);
    }
    .vt-table tr:hover td { background:rgba(255,255,255,.04); }
    .vt-table tr.vt-footer td {
      background:#0a2540; font-weight:800; color:rgba(255,255,255,.7);
      border-top:2px solid var(--azul2); font-size:.82rem; padding:7px 5px;
    }
    .vt-table tr.vt-footer td.nome-col { color:var(--azul3); }
    .vt-sep-col { border-left:2px solid var(--azul2) !important; }
    .vt-media-col { background:rgba(37,99,235,.15) !important; font-weight:800 !important; }
    .vt-neg-col { background:rgba(220,38,38,.12) !important; font-weight:800 !important; }

    /* Células de nota */
    .nc {
      border-radius: 6px; padding: 3px 8px; font-weight: 800;
      display: inline-block; min-width: 36px; font-size: .95rem;
    }
    .nc-neg { background: #dc2626; }
    .nc-med { background: #d97706; }
    .nc-bom { background: #16a34a; }
    .nc-exc { background: #2563eb; }
    .nc-nd  { color: rgba(255,255,255,.22); }
    .nc-txt { background: #4b5563; font-size: .75rem; }

    /* ── Barra de navegação ── */
    .ap-nav {
      background: #0a1628; border-top: 2px solid var(--borda);
      padding: .9rem 2rem; display: flex; align-items: center;
      justify-content: center; gap: 1.5rem; flex-shrink: 0;
    }
    .btn-nav {
      background: var(--azul); border: none; color: white;
      border-radius: 10px; padding: .7rem 2rem; font-weight: 700;
      font-size: 1.05rem; cursor: pointer; display: flex; align-items: center;
      gap: .6rem; transition: background .15s, transform .1s;
      min-width: 150px; justify-content: center;
    }
    .btn-nav:hover:not(:disabled) { background: var(--azul2); transform: scale(1.03); }
    .btn-nav:disabled { opacity: .25; cursor: not-allowed; transform: none; }
    .key-hint { font-size: .62rem; opacity: .45; display: block; }
    #select-aluno {
      background: #1e3a5f; color: white; border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px; padding: .55rem 1rem; font-size: .9rem;
      min-width: 240px; max-width: 320px; cursor: pointer;
    }
    .ap-counter { font-size: .9rem; opacity: .5; min-width: 60px; text-align: center; }
  </style>
</head>
<body>
<div class="ap-wrap">

  <!-- Topo -->
  <div class="ap-top">
    <span class="ap-turma"><i class="bi bi-people-fill me-2"></i>Reunião — {{ turma }}</span>
    <div style="display:flex; align-items:center; gap:1.5rem">
      <span style="font-size:.9rem; opacity:.5">{{ alunos|length }} aluno{{ 's' if alunos|length != 1 }}</span>
      <div style="display:flex; gap:.8rem; align-items:center">
        <button onclick="toggleVista()" id="btn-vista"
          style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:white;border-radius:6px;padding:.3rem .9rem;cursor:pointer;font-size:.85rem;font-weight:600">
          <i class="bi bi-table me-1"></i>Vista Turma
        </button>
        {% if slides_json != '[]' %}
        <button onclick="abrirSlide(0)" id="btn-slides"
          style="background:var(--azul2);border:none;color:white;border-radius:6px;padding:.3rem .9rem;cursor:pointer;font-size:.85rem;font-weight:600">
          <i class="bi bi-collection-play me-1"></i>Slides
        </button>
        {% endif %}
        <button onclick="toggleFS()" id="btn-fs" title="Ecrã inteiro"
          style="background:none;border:1px solid rgba(255,255,255,.3);color:white;border-radius:6px;padding:.3rem .7rem;cursor:pointer;font-size:1.2rem">
          <i class="bi bi-fullscreen" id="fs-icon"></i>
        </button>
        <a href="{{ url_for('ver_turma', turma=turma) }}" class="ap-close" title="Sair">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
  </div>

  <!-- Corpo -->
  <div class="ap-body" id="ap-body-aluno">

    <!-- Esquerda -->
    <div class="ap-left" id="painel-esq">
      <div class="ap-foto-wrap" id="foto-wrap"></div>
      <div id="nome-aluno" class="ap-nome"></div>
      <div id="meta-aluno" class="ap-meta"></div>
      <div id="medias-box" class="ap-medias"></div>
      <div id="alerta-neg"></div>
      <div id="notas-reuniao"></div>
    </div>

    <!-- Direita -->
    <div class="ap-right" id="painel-dir">
      <div id="tabela-container"></div>
    </div>
  </div>

  <!-- Vista Turma -->
  <div class="vt-wrap" id="vista-turma" style="display:none">
    <div id="vt-container"></div>
  </div>

  <!-- Navegação -->
  <div class="ap-nav" id="ap-nav">
    <button class="btn-nav" id="btn-ant" onclick="navegar(-1)">
      <i class="bi bi-chevron-left"></i> Anterior
      <span class="key-hint">← seta</span>
    </button>
    <select id="select-aluno" onchange="irPara(this.value)"></select>
    <span class="ap-counter" id="idx-label"></span>
    <button class="btn-nav" id="btn-prox" onclick="navegar(1)">
      Seguinte <i class="bi bi-chevron-right"></i>
      <span class="key-hint">seta →</span>
    </button>
  </div>
</div>

{% if slides_json != '[]' %}

<!-- Slide fullscreen -->
<div class="slide-full" id="slide-full" style="display:none">
  <div class="slide-full-header">
    <span id="slide-titulo-header" style="font-weight:700; font-size:1.1rem"></span>
    <button onclick="fecharSlide()" style="background:none;border:none;color:white;font-size:1.5rem;cursor:pointer">✕</button>
  </div>
  <div class="slide-full-body" id="slide-full-body"></div>
  <div class="slide-nav-bar">
    <button class="btn-nav" id="slide-btn-ant" onclick="navSlide(-1)">
      <i class="bi bi-chevron-left"></i> Anterior
      <span style="font-size:.62rem;opacity:.4;display:block">← seta</span>
    </button>
    <select id="slide-sel" onchange="abrirSlide(parseInt(this.value))"
      style="background:#1e3a5f;color:white;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:.5rem 1rem;font-size:.88rem;min-width:200px;cursor:pointer">
    </select>
    <span id="slide-idx" style="font-size:.9rem; opacity:.5; min-width:60px; text-align:center"></span>
    <button class="btn-nav" id="slide-btn-prox" onclick="navSlide(1)">
      Seguinte <i class="bi bi-chevron-right"></i>
      <span style="font-size:.62rem;opacity:.4;display:block">seta →</span>
    </button>
  </div>
</div>
{% endif %}

<script>
const ALUNOS = {{ alunos_json | safe }};
const SLIDES = {{ slides_json | safe }};
let idx = 0;

function nc(n) {
  if (n === null || n === undefined) return '<span class="nc nc-nd">—</span>';
  if (typeof n === 'string') return `<span class="nc nc-txt">${n}</span>`;
  const cls = n < 10 ? 'nc-neg' : n < 14 ? 'nc-med' : n < 17 ? 'nc-bom' : 'nc-exc';
  const val = Number.isInteger(n) ? n : n.toFixed(1);
  return `<span class="nc ${cls}">${val}</span>`;
}

function popularDropdown() {
  const sel = document.getElementById('select-aluno');
  sel.innerHTML = '';
  ALUNOS.forEach((a, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = `${i+1}. ${a.nome}`;
    sel.appendChild(o);
  });
}

function irPara(i) {
  idx = parseInt(i);
  mostrar(idx);
}

function mostrar(i) {
  const a = ALUNOS[i];
  document.getElementById('select-aluno').value = i;

  // Foto
  const fw = document.getElementById('foto-wrap');
  fw.innerHTML = a.foto_url
    ? `<img src="${a.foto_url}" class="ap-foto" alt="">`
    : `<div class="ap-foto-ph"><i class="bi bi-person-fill"></i></div>`;

  document.getElementById('nome-aluno').textContent = a.nome;
  document.getElementById('meta-aluno').textContent = `Nº ${a.numero||'—'} · ${a.turma}`;

  // Médias por semestre actual
  const linhasSem = (a.linhas||[]).filter(l => l.tipo==='semestre' && l.atual);
  let mediasHtml = '';
  linhasSem.forEach(l => {
    if (l.media !== null && l.media !== undefined) {
      const cls = l.media < 10 ? 'nc-neg' : l.media < 14 ? 'nc-med' : l.media < 17 ? 'nc-bom' : 'nc-exc';
      const lbl = l.label.split('—')[1]?.trim() || '';
      mediasHtml += `<div class="ap-media-box">
        <div class="ap-media-val nc ${cls}">${l.media.toFixed(1)}</div>
        <div class="ap-media-lbl">${lbl}</div>
      </div>`;
    }
  });
  document.getElementById('medias-box').innerHTML = mediasHtml;

  // Alertas
  const alertEl = document.getElementById('alerta-neg');
  const negas = a.negas || [];
  if (negas.length) {
    let html = `<div class="ap-alerta"><div style="color:#f87171; font-weight:700; font-size:.9rem"><i class="bi bi-exclamation-triangle-fill me-1"></i>Negativas</div>`;
    negas.forEach(([d,n]) => {
      html += `<div class="ap-alerta-item">${nc(n)}<span style="font-size:.88rem">${d}</span></div>`;
    });
    alertEl.innerHTML = html + '</div>';
  } else {
    alertEl.innerHTML = '';
  }

  // Notas reunião
  const cats = [
    {id:'observacoes',  label:'Observações',    icon:'bi-journal-text',        cor:'#60a5fa'},
    {id:'preocupacoes', label:'Preocupações',    icon:'bi-exclamation-triangle', cor:'#f87171'},
    {id:'positivos',    label:'Pontos Positivos',icon:'bi-star',                cor:'#4ade80'},
    {id:'apoio_caa',    label:'Apoio / CAA',     icon:'bi-life-preserver',      cor:'#c084fc'},
  ];
  const nr = a.notas_reuniao || {};
  let nrHtml = '';
  cats.forEach(c => {
    const txt = (nr[c.id]||'').trim();
    if (txt) {
      nrHtml += `<div class="ap-nota-bloco">
        <div class="ap-nota-titulo" style="color:${c.cor}"><i class="bi ${c.icon} me-1"></i>${c.label}</div>
        <div class="ap-nota-texto">${txt}</div>
      </div>`;
    }
  });
  document.getElementById('notas-reuniao').innerHTML = nrHtml || '<div class="ap-nota-vazio">Sem notas para a reunião</div>';

  // Tabela
  const discs  = a.disciplinas || [];
  const linhas = a.linhas || [];
  if (!discs.length) {
    document.getElementById('tabela-container').innerHTML = '<p style="opacity:.35; padding:2rem">Sem notas.</p>';
  } else {
    let html = `<table class="ap-table"><thead><tr>
      <th class="label-col">Ano / Semestre</th>
      ${discs.map((d,i) => `<th title="${d}"${i===a.separador_idx?' class="sep-col"':''}>${a.abrevs[d]||d.substring(0,7)}</th>`).join('')}
      <th class="media-col">Média</th>
    </tr></thead><tbody>`;

    linhas.forEach(l => {
      const cls = l.tipo==='cif' ? 'cif-row' : l.tipo==='cfd' ? 'cfd-row' : l.tipo==='exame' ? 'exame-row' : l.tipo==='auto_av' ? 'auto-av-row' : (l.atual ? 'atual-row' : '');
      html += `<tr class="${cls}">
        <td class="label-col">${l.label}</td>
        ${discs.map((d,i) => {
          const v = l.notas[d];
          return `<td${i===a.separador_idx?' class="sep-col"':''}>${nc(v!==undefined?v:null)}</td>`;
        }).join('')}
        <td class="media-col">${nc(l.media)}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tabela-container').innerHTML = html;
  }

  // Navegação
  document.getElementById('idx-label').textContent = `${i+1}/${ALUNOS.length}`;
  document.getElementById('btn-ant').disabled  = (i <= 0);
  document.getElementById('btn-prox').disabled = (i >= ALUNOS.length - 1);
  document.getElementById('painel-dir').scrollTop = 0;
  document.getElementById('painel-esq').scrollTop = 0;
}

function navegar(dir) {
  const novo = idx + dir;
  if (novo >= 0 && novo < ALUNOS.length) {
    idx = novo;
    mostrar(idx);
  }
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') navegar(1);
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   navegar(-1);
});

let vistaAtual = 'aluno'; // 'aluno' | 'turma'

function toggleVista() {
  if (vistaAtual === 'aluno') {
    vistaAtual = 'turma';
    document.getElementById('ap-body-aluno').style.display = 'none';
    document.getElementById('vista-turma').style.display = 'flex';
    document.getElementById('ap-nav').style.display = 'none';
    document.getElementById('btn-vista').innerHTML = '<i class="bi bi-person me-1"></i>Vista Aluno';
    construirVistaTurma();
  } else {
    vistaAtual = 'aluno';
    document.getElementById('ap-body-aluno').style.display = 'flex';
    document.getElementById('vista-turma').style.display = 'none';
    document.getElementById('ap-nav').style.display = 'flex';
    document.getElementById('btn-vista').innerHTML = '<i class="bi bi-table me-1"></i>Vista Turma';
  }
}

function construirVistaTurma() {
  // Recolher todas as disciplinas presentes (usando as do primeiro aluno com dados como referência)
  const discSet = new Set();
  ALUNOS.forEach(a => (a.disciplinas||[]).forEach(d => discSet.add(d)));
  const discs = Array.from(discSet);

  // Para cada aluno, extrair a nota do semestre mais recente (linha "atual" tipo "semestre")
  function notaActual(aluno, disc) {
    const linhas = (aluno.linhas||[]).filter(l => l.tipo==='semestre' && l.atual);
    // Pegar último semestre com dados
    for (let i = linhas.length-1; i >= 0; i--) {
      const v = linhas[i].notas[disc];
      if (v !== null && v !== undefined) return v;
    }
    return null;
  }

  function ncVT(v) {
    if (v === null || v === undefined) return '<span style="color:rgba(255,255,255,.2)">—</span>';
    if (typeof v === 'string') return `<span style="background:#4b5563;color:white;border-radius:3px;padding:1px 3px;font-size:.7rem">${v}</span>`;
    const cls = v<10?'nc-neg':v<14?'nc-med':v<17?'nc-bom':'nc-exc';
    return `<span class="nc ${cls}" style="min-width:20px;padding:2px 4px;font-size:clamp(.65rem,.9vw,.82rem)">${v}</span>`;
  }

  let html = `<table class="vt-table"><thead><tr>
    <th class="nome-col">#  Aluno</th>
    ${discs.map((d,i) => `<th${i===ALUNOS[0]?.separador_idx?' class="vt-sep-col"':''}>${ALUNOS[0]?.abrevs[d]||d.substring(0,7)}</th>`).join('')}
    <th class="vt-media-col vt-sep-col">Média</th>
    <th class="vt-neg-col">Neg.</th>
  </tr></thead><tbody>`;

  const mediasTurma = {};
  const negsTurma   = {};
  discs.forEach(d => { mediasTurma[d] = []; negsTurma[d] = 0; });

  ALUNOS.forEach((a, ri) => {
    let vals = [], negs = 0;
    const cells = discs.map((d,i) => {
      const v = notaActual(a, d);
      if (typeof v === 'number') {
        vals.push(v);
        mediasTurma[d].push(v);
        if (v < 10) { negs++; negsTurma[d]++; }
      }
      return `<td${i===a.separador_idx?' class="vt-sep-col"':''}>${ncVT(v)}</td>`;
    }).join('');

    const med   = vals.length ? (vals.reduce((s,v)=>s+v,0)/vals.length) : null;
    const medCls = med===null?'nc-nd':med<10?'nc-neg':med<14?'nc-med':med<17?'nc-bom':'nc-exc';
    html += `<tr>
      <td class="nome-col">${ri+1}. ${a.nome}</td>
      ${cells}
      <td class="vt-media-col vt-sep-col">${med!==null?`<span class="nc ${medCls}" style="font-size:.85rem">${med.toFixed(1)}</span>`:'—'}</td>
      <td class="vt-neg-col">${negs>0?`<span style="background:#dc2626;color:white;border-radius:4px;padding:1px 6px;font-weight:800">${negs}</span>`:'—'}</td>
    </tr>`;
  });

  // Rodapé: médias por disciplina
  const medRow = discs.map((d,i) => {
    const arr = mediasTurma[d];
    const m = arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : null;
    const cls = m===null?'':m<10?'nc-neg':m<14?'nc-med':m<17?'nc-bom':'nc-exc';
    return `<td${i===ALUNOS[0]?.separador_idx?' class="vt-sep-col"':''}>${m!==null?`<span class="nc ${cls}" style="font-size:.82rem">${m.toFixed(1)}</span>`:'—'}</td>`;
  }).join('');

  const negRow = discs.map((d,i) => {
    const n = negsTurma[d];
    return `<td${i===ALUNOS[0]?.separador_idx?' class="vt-sep-col"':''}>${n>0?`<span style="color:#f87171;font-weight:800">${n}</span>`:'—'}</td>`;
  }).join('');

  const totalNegs = Object.values(negsTurma).reduce((s,v)=>s+v,0);

  html += `</tbody><tfoot>
    <tr class="vt-footer">
      <td class="nome-col" style="color:var(--azul3)">Média da Turma</td>
      ${medRow}
      <td class="vt-media-col vt-sep-col"></td>
      <td class="vt-neg-col"></td>
    </tr>
    <tr class="vt-footer">
      <td class="nome-col" style="color:#f87171">Nº Negativas</td>
      ${negRow}
      <td class="vt-media-col vt-sep-col"></td>
      <td class="vt-neg-col" style="color:#f87171;font-weight:800">${totalNegs||'—'}</td>
    </tr>
  </tfoot></table>`;

  document.getElementById('vt-container').innerHTML = html;
}

// ── Slides ──────────────────────────────────────────────────────────────────
let slideIdx = 0;

function abrirSlide(i) {
  if (!SLIDES || !SLIDES[i]) return;
  slideIdx = i;
  const s = SLIDES[i];
  document.getElementById('slide-titulo-header').textContent = s.titulo || '';
  document.getElementById('slide-full').style.display = 'flex';

  // Popular dropdown se ainda não estiver
  const sel = document.getElementById('slide-sel');
  if (sel && sel.options.length === 0) {
    SLIDES.forEach((sl, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = `${idx+1}. ${sl.titulo || '(sem título)'}`;
      sel.appendChild(opt);
    });
  }
  if (sel) sel.value = i;

  renderSlideConteudo(s, i);
}

function renderSlideConteudo(s, i) {
  const body = document.getElementById('slide-full-body');
  let html = '';
  if (s.imagem_url) html += `<img src="${s.imagem_url}" class="slide-img" alt="">`;
  if (s.titulo) html += `<div class="slide-titulo-grande">${s.titulo}</div>`;
  if (s.tipo === 'lista' && s.conteudo) {
    const linhas = s.conteudo.split('\n').filter(l => l.trim());
    html += `<ul class="slide-lista">${linhas.map(l => `<li>${l.trim()}</li>`).join('')}</ul>`;
  } else if (s.conteudo) {
    html += `<div class="slide-texto">${s.conteudo}</div>`;
  }
  body.innerHTML = html;

  document.getElementById('slide-idx').textContent = `${i+1} / ${SLIDES.length}`;
  document.getElementById('slide-btn-ant').disabled = (i <= 0);
  document.getElementById('slide-btn-prox').disabled = (i >= SLIDES.length - 1);
}

function navSlide(dir) {
  const novo = slideIdx + dir;
  if (novo >= 0 && novo < SLIDES.length) {
    slideIdx = novo;
    abrirSlide(slideIdx);
  }
}

function fecharSlide() {
  document.getElementById('slide-full').style.display = 'none';
  renderSlidesLista();
}

// Teclas de seta dentro do slide fullscreen
document.addEventListener('keydown', e => {
  if (document.getElementById('slide-full')?.style.display !== 'none') {
    if (e.key==='ArrowRight'||e.key==='ArrowDown') navSlide(1);
    if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   navSlide(-1);
    if (e.key==='Escape') fecharSlide();
    e.stopPropagation();
  }
});

function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById('fs-icon').className = 'bi bi-fullscreen-exit';
  } else {
    document.exitFullscreen();
    document.getElementById('fs-icon').className = 'bi bi-fullscreen';
  }
}
document.addEventListener('fullscreenchange', () => {
  document.getElementById('fs-icon').className =
    document.fullscreenElement ? 'bi bi-fullscreen-exit' : 'bi bi-fullscreen';
});
