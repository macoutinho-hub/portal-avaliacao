{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width:600px">
  <h4 class="mb-4"><i class="bi bi-pencil-square me-2"></i>Importar Inscrições de Exame</h4>

  <div class="card shadow-sm">
    <div class="card-body">
      <p class="text-muted mb-3">Carregue o ficheiro <strong>AluExame.txt</strong> exportado do sistema escolar.</p>
      <form method="post" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label fw-semibold">Ficheiro AluExame (.txt)</label>
          <input type="file" name="ficheiro" accept=".txt" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-upload me-1"></i>Importar
        </button>
      </form>
    </div>
  </div>

  {% if n_registos %}
  <div class="mt-3 text-muted small">
    <i class="bi bi-info-circle me-1"></i>{{ n_registos }} inscrições registadas para {{ ano }}.
  </div>
  {% endif %}
</div>
{% endblock %}
