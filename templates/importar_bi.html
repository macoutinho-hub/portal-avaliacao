{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width:600px">
  <h4 class="mb-4"><i class="bi bi-person-vcard me-2"></i>Importar BI dos Alunos</h4>

  <div class="card shadow-sm">
    <div class="card-body">
      <p class="text-muted mb-3">Carregue o ficheiro <strong>Dados Alunos (Alunos.txt).xlsx</strong> exportado do sistema escolar.</p>
      <form method="post" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label fw-semibold">Ficheiro (.xlsx)</label>
          <input type="file" name="ficheiro" accept=".xlsx,.xls" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-upload me-1"></i>Importar
        </button>
      </form>
    </div>
  </div>

  <div class="mt-3 text-muted small">
    <i class="bi bi-info-circle me-1"></i>{{ n_com_bi }} aluno(s) já têm BI registado.
  </div>
</div>
{% endblock %}
