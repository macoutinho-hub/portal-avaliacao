services:
  - type: web
    name: portal-avaliacao
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE
        value: /data/portal.db
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
